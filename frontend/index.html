<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="https://i.goopics.net/mghcvl.png">
    <title>Plan BU Saint-Serge</title>
    <style>
        /* CSS Variables kept for UI, Canvas will parse them for drawing */
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --seat-unknown: #cbd5e1;
            --seat-busy: #64748b;
            --seat-free: rgba(16, 185, 129, 0.8);
            --seat-border: rgba(255, 255, 255, 0.4);
            --plug-color: #3b82f6;
            --light-glow: rgba(253, 224, 71, 0.4);
            --tooltip-bg: rgba(15, 23, 42, 0.9);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            margin: 0; padding: 0;
            height: 100vh; height: 100dvh;
            overflow: hidden;
            display: flex; flex-direction: column;
            overscroll-behavior: none;
        }

        /* --- Header & Controls styling remain unchanged --- */
        .header { flex-shrink: 0; z-index: 50; background: #fff; padding: 12px 30px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 3px rgba(0,0,0,.05); padding-top: max(12px, env(safe-area-inset-top)); }
        .title { font-weight: 700; color: #1e293b; font-size: 20px; letter-spacing: -.5px; }
        .title-container { display: flex; align-items: center; gap: 10px; }
        .github-link { color: #1e293b; display: flex; align-items: center; transition: color 0.2s; }
        .github-link:hover { color: #2563eb; }
        .github-icon { width: 20px; height: 20px; fill: currentColor; }
        .reload-btn { background: #fff; border: 1px solid #cbd5e1; padding: 6px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; color: #475569; transition: all .2s; }
        .reload-btn:hover { background: #f1f5f9; border-color: #94a3b8; }
        .reload-btn:active { transform: translateY(1px); }
        .controls { flex-shrink: 0; background: #fff; padding: 15px 30px; border-bottom: 1px solid #e2e8f0; display: grid; grid-template-columns: 200px 1fr 200px; gap: 30px; align-items: center; z-index: 40; user-select: none; -webkit-user-select: none; }
        .date-sel { padding: 6px 10px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 14px; width: 100%; outline: 0; cursor: pointer; }
        .slider-container { display: flex; flex-direction: column; gap: 5px; }
        .time-label { text-align: center; font-weight: 600; color: var(--primary); font-size: 14px; margin-bottom: 5px; }
        .slider-wrap { position: relative; height: 30px; cursor: pointer; touch-action: none; }
        .track { position: absolute; top: 50%; width: 100%; height: 6px; background: #e2e8f0; border-radius: 3px; transform: translateY(-50%); }
        .fill { position: absolute; top: 50%; height: 6px; background: var(--primary); transform: translateY(-50%); border-radius: 3px; }
        .thumb { position: absolute; top: 50%; width: 20px; height: 20px; background: #fff; border: 2px solid var(--primary); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 1px 3px rgba(0,0,0,.2); z-index: 10; pointer-events: none; }
        .now-marker { position: absolute; top: -5px; bottom: -5px; width: 2px; background: red; z-index: 5; pointer-events: none; display: none; }
        .now-label { position: absolute; top: -12px; left: -50%; transform: translateX(-25%); font-size: 10px; color: red; font-weight: 700; }
        .legend-btn-wrap { display: flex; justify-content: flex-end; }
        .legend-btn { background: #f8fafc; border: 1px solid #e2e8f0; padding: 8px 16px; border-radius: 8px; font-weight: 600; color: #475569; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        
        /* Canvas specific styling */
        .viewport {
            flex: 1;
            position: relative;
            background: #e2e8f0;
            overflow: hidden; /* No more DOM scrolling */
            touch-action: none; 
            cursor: grab;
        }
        .viewport:active { cursor: grabbing; }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        /* Floating Tooltip */
        #canvasTooltip {
            position: fixed;
            background: var(--tooltip-bg);
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 2px 4px rgba(0, 0, 0, .3);
            transform: translate(-50%, -100%);
            margin-top: -10px;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        #canvasTooltip.visible { opacity: 1; }

        /* Action bar & UI overlays */
        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 20px 24px; box-shadow: 0 -4px 20px rgba(0,0,0,.15); transform: translateY(110%); transition: transform .3s cubic-bezier(.16, 1, .3, 1); z-index: 9999; display: flex; justify-content: space-between; align-items: center; border-top-left-radius: 16px; border-top-right-radius: 16px; padding-bottom: max(20px, env(safe-area-inset-bottom)); }
        .action-bar.visible { transform: translateY(0); }
        .action-info { display: flex; flex-direction: column; }
        .action-title { font-size: 18px; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
        .action-subtitle { font-size: 13px; color: #64748b; }
        .action-btn { background: var(--primary); color: #fff; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; font-size: 16px; box-shadow: 0 4px 6px -1px rgba(37,99,235,.3); cursor: pointer; }
        .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px); background: #ef4444; color: #fff; padding: 10px 20px; border-radius: 20px; font-weight: 600; font-size: 14px; opacity: 0; pointer-events: none; transition: all .3s ease; z-index: 2000; box-shadow: 0 10px 15px -3px rgba(0,0,0,.2); }
        .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
        .reset-zoom { display: none; position: absolute; bottom: 60px; right: 20px; background: #fff; border: 1px solid #cbd5e1; padding: 10px; border-radius: 50%; box-shadow: 0 4px 6px rgba(0,0,0,.1); z-index: 100; font-size: 20px; width: 44px; height: 44px; justify-content: center; align-items: center; cursor: pointer; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .header { padding: 10px 15px; padding-top: max(10px, env(safe-area-inset-top)); }
            .title { font-size: 16px; }
            .reload-btn span:first-child { display: none; }
            .controls { grid-template-columns: 1fr auto; grid-template-areas: "date legend" "slider slider"; gap: 12px; padding: 15px; height: auto; }
            .controls > div:first-child { grid-area: date; }
            .date-sel { height: 36px; box-sizing: border-box; padding: 0 10px; }
            .legend-btn { height: 36px; box-sizing: border-box; width: auto; justify-content: center; padding: 0 12px; font-size: 13px; background: transparent; border: 1px solid #cbd5e1; margin: 0; }
            .slider-container { grid-area: slider; flex-direction: row; align-items: center; gap: 15px; }
            .slider-wrap { flex: 1; }
            .time-label { margin-bottom: 0; order: 2; min-width: 85px; text-align: right; }
            .legend-btn-wrap { grid-area: legend; justify-content: flex-end; }
            .reset-zoom { display: flex; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title-container">
            <div class="title">📚 Plan BU Saint-Serge</div>
        </div>
        <button class="reload-btn" id="btnReload"><span id="lastUpdate">--:--</span> <span>↻ Actualiser</span></button>
    </div>
    
    <div class="controls">
        <div><select id="datePicker" class="date-sel"></select></div>
        <div class="slider-container">
            <div class="time-label"><span id="lblStart">--</span> - <span id="lblEnd">--</span></div>
            <div class="slider-wrap" id="slider">
                <div class="track"></div><div class="fill" id="fill"></div>
                <div id="nowMarker" class="now-marker"><div class="now-label">Maintenant</div></div>
                <div class="thumb" id="thS"></div><div class="thumb" id="thE"></div>
            </div>
        </div>
        <div class="legend-btn-wrap">
            <button class="legend-btn" id="btnOpenLegend">ℹ️ Légende interactive</button>
        </div>
    </div>

    <div class="viewport" id="viewport">
        <canvas id="mapCanvas"></canvas>
        <div id="canvasTooltip"></div>
        <button class="reset-zoom" id="btnReset">⛶</button>
    </div>

    <div id="actionBar" class="action-bar">
        <div class="action-info">
            <div class="action-title" id="barTitle">Place --</div>
            <div class="action-subtitle" id="barStatus">Sélectionnez une place</div>
        </div>
        <button class="action-btn" id="btnBook">Réserver</button>
    </div>
    <div id="toast" class="toast">⚠️ Données indisponibles</div>

    <script>
        const API_BASE_URL = "https://plan-bu-backend.hdbdt1597-cloudflare.workers.dev";
        const SITE_SLUG = "bua-st-serge";

        // Global State
        const MIN_HOUR = 8, MAX_HOUR = 22;
        const nowH = new Date().getHours();
        
        let LOCATIONS = {};
        let AVAILABILITY = {};
        let SEATS = []; // Flat array of mathematical seat bounds
        let mapImage = new Image();
        let mapBaseHeight = 1600; // Will be updated when image loads
        
        let hoveredSeatId = null;
        let isFetchingData = true;

        const appState = new Proxy({
            startHour: Math.max(MIN_HOUR, Math.min(MAX_HOUR, nowH)),
            endHour: Math.max(MIN_HOUR, Math.min(MAX_HOUR, nowH + 2)),
            selectedSeatId: null
        }, {
            set(target, prop, value) {
                if (target[prop] === value) return true;
                target[prop] = value;
                updateMapState();
                requestRender();
                return true;
            }
        });

        // Canvas Setup
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // alpha:false optimizes performance
        const tooltip = document.getElementById('canvasTooltip');
        
        let mapState = { x: 0, y: 0, scale: 1 };
        let dpr = window.devicePixelRatio || 1;

        // Colors (Parsed from CSS)
        const C_BG = '#f8fafc';
        const C_UNKNOWN = '#cbd5e1';
        const C_BUSY = '#64748b';
        const C_FREE = 'rgba(16, 185, 129, 0.8)';
        const C_BORDER = 'rgba(255, 255, 255, 0.4)';
        const C_SELECT = '#ffffff';
        const C_PLUG = '#3b82f6';
        const C_LIGHT = 'rgba(253, 224, 71, 0.4)';

        const els = {
            dp: document.getElementById('datePicker'),
            toast: document.getElementById('toast'),
            slider: document.getElementById('slider'),
            btnReload: document.getElementById('btnReload'),
            lastUpdate: document.getElementById('lastUpdate'),
            fill: document.getElementById('fill'),
            thS: document.getElementById('thS'),
            thE: document.getElementById('thE'),
            lblStart: document.getElementById('lblStart'),
            lblEnd: document.getElementById('lblEnd'),
            nowMarker: document.getElementById('nowMarker'),
            viewport: document.getElementById('viewport'),
            actionBar: document.getElementById('actionBar'),
            barTitle: document.getElementById('barTitle'),
            barStatus: document.getElementById('barStatus'),
            btnBook: document.getElementById('btnBook'),
            btnReset: document.getElementById('btnReset')
        };

        async function init() {
            resizeCanvas();
            window.addEventListener('resize', () => { resizeCanvas(); requestRender(); });

            // Setup Datepicker
            const today = new Date();
            for (let i = 0; i < 4; i++) {
                let d = new Date(today);
                d.setDate(today.getDate() + i);
                const localDate = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                let t = d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
                els.dp.add(new Option(t.charAt(0).toUpperCase() + t.slice(1), localDate));
            }

            // Load Map Image
            mapImage.src = `${API_BASE_URL}/assets/map.webp`;
            await new Promise(r => mapImage.onload = r);
            mapBaseHeight = 1600 * (mapImage.naturalHeight / mapImage.naturalWidth);
            centerMap();

            try {
                const configRes = await fetch(`${API_BASE_URL}/api/config`);
                LOCATIONS = await configRes.json();
                buildHitGrid();
            } catch (e) {
                showToast("Erreur config", true);
            }

            setupPointerEvents();
            setupSlider();
            
            els.btnReload.addEventListener('click', () => loadData(true));
            els.dp.addEventListener('change', () => { updateSliderUI(); loadData(); });
            els.btnReset.addEventListener('click', () => { centerMap(); requestRender(); });
            els.btnBook.addEventListener('click', () => { if (appState.selectedSeatId) openBooking(appState.selectedSeatId); });

            loadData();
            updateSliderUI();
            startAnimationLoop(); // Starts the skeleton loop
        }

        // --- Core Math Engine (Flattening grid to absolute coordinates) ---
        function buildHitGrid() {
            SEATS = [];
            const BASE_W = 1600;
            const BASE_H = mapBaseHeight;

            Object.values(LOCATIONS).forEach(g => {
                let { id, ids: groupIds, start, end, direction = 'horizontal', label, layout, invert, x, y, w, h } = g;
                
                let ids = [];
                if (id) ids = [id.toString()];
                else if (groupIds) ids = [...groupIds];
                else if (start !== undefined && end !== undefined) {
                    const c = parseInt(end) - parseInt(start) + 1;
                    for (let i = 0; i < c; i++) ids.push((parseInt(start) + i).toString());
                } else return;

                const count = ids.length;
                if (count === 0) return;

                // Box absolute boundaries in 1600x map coordinates
                const boxX = (x / 100) * BASE_W;
                const boxY = (y / 100) * BASE_H;
                const boxW = (w / 100) * BASE_W;
                const boxH = (h / 100) * BASE_H;

                const isDouble = layout === 'double';
                let cols = 1, rows = 1;
                
                if (direction === 'horizontal') {
                    rows = isDouble ? 2 : 1; 
                    cols = isDouble ? Math.ceil(count / 2) : count;
                } else {
                    cols = isDouble ? 2 : 1; 
                    rows = isDouble ? Math.ceil(count / 2) : count;
                }

                if (isDouble) {
                    const m = Math.ceil(count / 2);
                    ids = invert ? [...ids.slice(m).reverse(), ...ids.slice(0, m)] : [...ids.slice(0, m), ...ids.slice(m).reverse()];
                } else if (invert) ids.reverse();

                // Gap simulation (2px at 1600px scale)
                const GAP = 2;
                const seatW = (boxW - (GAP * (cols - 1))) / cols;
                const seatH = (boxH - (GAP * (rows - 1))) / rows;

                ids.forEach((seatId, index) => {
                    let col = direction === 'horizontal' ? (index % cols) : Math.floor(index / rows);
                    let row = direction === 'horizontal' ? Math.floor(index / cols) : (index % rows);

                    const sX = boxX + (col * (seatW + GAP));
                    const sY = boxY + (row * (seatH + GAP));

                    SEATS.push({
                        id: seatId,
                        boxStartId: ids[0],
                        label: label || seatId,
                        x: sX, y: sY, w: seatW, h: seatH,
                        boxX: boxX, boxY: boxY, boxW: boxW, boxH: boxH, // For group glows
                        state: 'skeleton',
                        hasPlug: false,
                        hasLight: false
                    });
                });
            });
        }

        // --- State Management ---
        async function loadData(force = false) {
            isFetchingData = true;
            startAnimationLoop();
            
            SEATS.forEach(s => s.state = 'skeleton');
            els.btnReload.style.opacity = '0.5';
            
            try {
                const url = `${API_BASE_URL}/api/load_day?date=${els.dp.value}&force=${force}&t=${Date.now()}`;
                const res = await fetch(url);
                if (res.status === 503) { setTimeout(() => loadData(force), 2000); return; }
                const data = await res.json();
                
                if (Object.keys(data).length === 0) {
                    SEATS.forEach(s => s.state = 'unknown');
                    showToast("Fermé", true);
                } else {
                    AVAILABILITY = data;
                    showToast("À jour", false);
                }
            } catch (e) {
                SEATS.forEach(s => s.state = 'unknown');
                showToast("Erreur", true);
            }
            
            isFetchingData = false;
            els.btnReload.style.opacity = '1';
            updateMapState();
            requestRender();
        }

        function updateMapState() {
            if (Object.keys(AVAILABILITY).length === 0) return;
            const isSunday = new Date(els.dp.value).getDay() === 0;
            const s = Math.min(appState.startHour, appState.endHour);
            const e = Math.max(appState.startHour, appState.endHour);
            const reqSlots = [];
            
            if (s === e) reqSlots.push(formatTime(s, isSunday));
            else for (let h = s; h < e; h++) reqSlots.push(formatTime(h, isSunday));

            SEATS.forEach(seat => {
                const d = AVAILABILITY[seat.id];
                const gD = AVAILABILITY[seat.boxStartId];
                
                if (gD) {
                    seat.hasPlug = !!gD.hasPlug;
                    seat.hasLight = !!gD.hasLight;
                }

                if (d) {
                    const isFree = reqSlots.length > 0 && reqSlots.every(r => d.slots.includes(r));
                    seat.state = isFree ? 'free' : 'busy';
                } else {
                    seat.state = 'unknown';
                }
            });
        }

        // --- Canvas Rendering Engine ---
        let renderPending = false;
        let animId = null;

        function resizeCanvas() {
            dpr = window.devicePixelRatio || 1;
            canvas.width = canvas.clientWidth * dpr;
            canvas.height = canvas.clientHeight * dpr;
        }

        function centerMap() {
            const viewW = els.viewport.clientWidth;
            mapState.scale = viewW / 1600;
            mapState.x = 0;
            mapState.y = Math.max(0, (els.viewport.clientHeight - (mapBaseHeight * mapState.scale)) / 2);
        }

        function requestRender() {
            if (!renderPending && !isFetchingData) {
                renderPending = true;
                requestAnimationFrame(() => { renderPending = false; draw(); });
            }
        }

        function startAnimationLoop() {
            if (animId) return;
            const loop = () => {
                draw();
                if (isFetchingData) animId = requestAnimationFrame(loop);
                else animId = null;
            };
            animId = requestAnimationFrame(loop);
        }

        function draw() {
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.fillStyle = C_BG;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Set World Transform
            ctx.setTransform(mapState.scale * dpr, 0, 0, mapState.scale * dpr, mapState.x * dpr, mapState.y * dpr);

            // 1. Draw Image Background
            if (mapImage.complete) {
                ctx.drawImage(mapImage, 0, 0, 1600, mapBaseHeight);
            }

            const now = Date.now();
            const drawnPlugs = new Set();
            const drawnLights = new Set();

            // 2. Draw Group Features (Plugs & Lights behind seats)
            ctx.lineWidth = 3;
            SEATS.forEach(s => {
                if (s.hasPlug && !drawnPlugs.has(s.boxStartId)) {
                    ctx.strokeStyle = C_PLUG;
                    ctx.strokeRect(s.boxX - 3, s.boxY - 3, s.boxW + 6, s.boxH + 6);
                    drawnPlugs.add(s.boxStartId);
                }
                if (s.hasLight && !drawnLights.has(s.boxStartId)) {
                    ctx.fillStyle = C_LIGHT;
                    ctx.shadowColor = C_LIGHT;
                    ctx.shadowBlur = 20;
                    ctx.fillRect(s.boxX, s.boxY, s.boxW, s.boxH);
                    ctx.shadowBlur = 0; // Reset
                    drawnLights.add(s.boxStartId);
                }
            });

            // 3. Draw Individual Seats
            ctx.lineWidth = 1;
            ctx.strokeStyle = C_BORDER;

            SEATS.forEach(s => {
                let fill = C_UNKNOWN;
                let scaleOffset = 0;
                let isSelected = appState.selectedSeatId === s.id;
                let isHovered = hoveredSeatId === s.id;

                if (s.state === 'busy') fill = C_BUSY;
                if (s.state === 'free') fill = C_FREE;
                
                // Skeleton Pulse Math
                if (s.state === 'skeleton') {
                    // Sine wave based on time and diagonal position to simulate CSS delay
                    const delayCalc = ((100 - (s.x/16)) + (100 - (s.y/(mapBaseHeight/100))));
                    const phase = (now / 1500 * Math.PI * 2) - (delayCalc * 0.05);
                    const alpha = (Math.sin(phase) + 1) / 2; // 0 to 1
                    fill = `rgba(255, 255, 255, ${alpha * 0.4})`; 
                }

                if (isSelected || isHovered) {
                    scaleOffset = -2; // Grow visually
                    ctx.strokeStyle = C_SELECT;
                    ctx.shadowColor = 'rgba(0,0,0,0.2)';
                    ctx.shadowBlur = 6;
                } else {
                    ctx.strokeStyle = C_BORDER;
                    ctx.shadowBlur = 0;
                }

                ctx.fillStyle = fill;
                ctx.beginPath();
                ctx.roundRect(s.x + scaleOffset, s.y + scaleOffset, s.w - (scaleOffset*2), s.h - (scaleOffset*2), 2);
                ctx.fill();
                ctx.stroke();
            });
        }

        // --- Interaction Physics (Hit Detection & Pan/Zoom) ---
        function getSeatAt(clientX, clientY) {
            const r = canvas.getBoundingClientRect();
            // Reverse math: Convert screen pixel to world coordinate
            const wX = (clientX - r.left - mapState.x) / mapState.scale;
            const wY = (clientY - r.top - mapState.y) / mapState.scale;

            // Simple loop is incredibly fast for <5000 items
            for (let i = 0; i < SEATS.length; i++) {
                const s = SEATS[i];
                if (wX >= s.x && wX <= s.x + s.w && wY >= s.y && wY <= s.y + s.h) {
                    return s;
                }
            }
            return null;
        }

        function setupPointerEvents() {
            const pointers = new Map();
            let startX = 0, startY = 0, sD = 0, sS = 1, sVX = 0, sVY = 0;
            let wasDragging = false;

            canvas.addEventListener('pointerdown', e => {
                pointers.set(e.pointerId, e);
                canvas.setPointerCapture(e.pointerId);
                if (pointers.size === 1) { startX = e.clientX; startY = e.clientY; }
                wasDragging = false;

                // Sync anchors
                const pts = Array.from(pointers.values());
                if (pts.length === 1) {
                    sVX = pts[0].clientX - mapState.x;
                    sVY = pts[0].clientY - mapState.y;
                } else if (pts.length === 2) {
                    sD = Math.hypot(pts[0].clientX - pts[1].clientX, pts[0].clientY - pts[1].clientY);
                    sS = mapState.scale;
                    sVX = ((pts[0].clientX + pts[1].clientX)/2) - mapState.x;
                    sVY = ((pts[0].clientY + pts[1].clientY)/2) - mapState.y;
                }
            });

            canvas.addEventListener('pointermove', e => {
                // 1. Tooltip Hover Logic (Only if not dragging/touching)
                if (pointers.size === 0 && e.pointerType === 'mouse') {
                    const hovered = getSeatAt(e.clientX, e.clientY);
                    const newId = hovered ? hovered.id : null;
                    if (hoveredSeatId !== newId) {
                        hoveredSeatId = newId;
                        canvas.style.cursor = hovered ? 'pointer' : 'grab';
                        if (hovered) {
                            tooltip.innerText = hovered.label;
                            tooltip.classList.add('visible');
                        } else {
                            tooltip.classList.remove('visible');
                        }
                        requestRender();
                    }
                    if (hoveredSeatId) {
                        tooltip.style.left = e.clientX + 'px';
                        tooltip.style.top = (e.clientY - 15) + 'px';
                    }
                }

                // 2. Pan/Zoom Logic
                if (!pointers.has(e.pointerId)) return;
                pointers.set(e.pointerId, e);
                
                const pts = Array.from(pointers.values());
                if (pts.length === 2) {
                    wasDragging = true;
                    tooltip.classList.remove('visible');
                    const cD = Math.hypot(pts[0].clientX - pts[1].clientX, pts[0].clientY - pts[1].clientY);
                    const rS = cD / sD;
                    mapState.scale = Math.max(0.1, Math.min(sS * rS, 4));
                    mapState.x = ((pts[0].clientX + pts[1].clientX)/2) - (sVX * rS);
                    mapState.y = ((pts[0].clientY + pts[1].clientY)/2) - (sVY * rS);
                    requestRender();
                } else if (pts.length === 1) {
                    const dist = Math.hypot(e.clientX - startX, e.clientY - startY);
                    if (dist > 5) wasDragging = true;
                    if (wasDragging) {
                        tooltip.classList.remove('visible');
                        mapState.x = pts[0].clientX - sVX;
                        mapState.y = pts[0].clientY - sVY;
                        requestRender();
                    }
                }
            });

            const handleUp = e => {
                pointers.delete(e.pointerId);
                
                // Hit detection on click
                if (!wasDragging && e.pointerType !== 'mouse' || (!wasDragging && e.pointerType === 'mouse')) {
                    const clickedSeat = getSeatAt(e.clientX, e.clientY);
                    if (clickedSeat) {
                        appState.selectedSeatId = clickedSeat.id;
                        els.barTitle.innerText = "Place " + clickedSeat.id;
                        let dets = [];
                        if(clickedSeat.hasPlug) dets.push("Prise");
                        if(clickedSeat.hasLight) dets.push("Lampe");
                        els.barStatus.innerText = dets.length > 0 ? dets.join(' • ') : "Standard";
                        els.actionBar.classList.add('visible');
                    } else {
                        appState.selectedSeatId = null;
                        els.actionBar.classList.remove('visible');
                    }
                    requestRender();
                }

                // Resync anchor on multi-touch release
                if (pointers.size > 0) {
                    const pts = Array.from(pointers.values());
                    sVX = pts[0].clientX - mapState.x;
                    sVY = pts[0].clientY - mapState.y;
                }
            };

            canvas.addEventListener('pointerup', handleUp);
            canvas.addEventListener('pointercancel', handleUp);
        }

        // --- Slider & Utils ---
        function formatTime(h, isSun) { return (h<10?'0'+h:h) + (isSun?':00':':30'); }
        function showToast(msg, err) { els.toast.innerText = msg; els.toast.style.background = err ? '#ef4444' : '#22c55e'; els.toast.classList.add('visible'); setTimeout(() => els.toast.classList.remove('visible'), 4000); }
        function openBooking(num) { const d = AVAILABILITY[num]; if(!d) return; window.open(`https://affluences.com/fr/sites/${SITE_SLUG}/reservation?type=${d.typeId||"245"}&date=${els.dp.value}&resource=${d.resourceId||num}`, '_blank'); }

        function updateSliderUI() {
            const isSun = new Date(els.dp.value).getDay() === 0;
            const pS = ((appState.startHour - MIN_HOUR) / (MAX_HOUR - MIN_HOUR)) * 100;
            const pE = ((appState.endHour - MIN_HOUR) / (MAX_HOUR - MIN_HOUR)) * 100;
            els.thS.style.left = pS + '%'; els.thE.style.left = pE + '%';
            els.fill.style.left = Math.min(pS, pE) + '%'; els.fill.style.width = Math.abs(pE - pS) + '%';
            els.lblStart.innerText = formatTime(Math.min(appState.startHour, appState.endHour), isSun);
            els.lblEnd.innerText = formatTime(Math.max(appState.startHour, appState.endHour), isSun);
            updateMapState();
            requestRender();
        }

        function setupSlider() {
            let activeThumb = null;
            const getH = x => { const r = els.slider.getBoundingClientRect(); return Math.round(MIN_HOUR + Math.max(0, Math.min(1, (x - r.left)/r.width)) * (MAX_HOUR - MIN_HOUR)); };
            const move = e => { if(!activeThumb) return; const h = getH(e.clientX); if(activeThumb === 'S') appState.startHour = h; else appState.endHour = h; updateSliderUI(); };
            const up = e => { activeThumb = null; els.slider.releasePointerCapture(e.pointerId); els.slider.removeEventListener('pointermove', move); els.slider.removeEventListener('pointerup', up); els.slider.removeEventListener('pointercancel', up); };
            
            els.slider.addEventListener('pointerdown', e => {
                els.slider.setPointerCapture(e.pointerId);
                const h = getH(e.clientX);
                if (Math.abs(h - appState.startHour) < Math.abs(h - appState.endHour)) { activeThumb = 'S'; appState.startHour = h; }
                else { activeThumb = 'E'; appState.endHour = h; }
                updateSliderUI();
                els.slider.addEventListener('pointermove', move);
                els.slider.addEventListener('pointerup', up);
                els.slider.addEventListener('pointercancel', up);
            });
        }

        init();
    </script>
</body>
</html>
