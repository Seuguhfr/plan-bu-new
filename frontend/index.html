<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="assets/icon.png">
    <link rel="apple-touch-icon" sizes="256x256" href="assets/icon.png">
    <title>Plan BU Saint-Serge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="title-container">
            <div class="title">Plan BU Saint-Serge</div>
            <a href="https://github.com/Seuguhfr/plan-bu" target="_blank" class="github-link">
                <svg class="github-icon" viewBox="0 0 16 16">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                </svg>
            </a>
        </div>
        <button class="reload-btn" id="btnReload"><span id="lastUpdate">--:--</span> <span>↻ Actualiser</span></button>
    </div>
    
    <div class="controls">
        <div><select id="datePicker" class="date-sel"></select></div>
        <div class="slider-container">
            <div class="time-label"><span id="lblStart">--</span> - <span id="lblEnd">--</span></div>
            <div class="slider-wrap" id="slider">
                <div class="track"></div><div class="fill" id="fill"></div>
                <div id="nowMarker" class="now-marker"><div class="now-label">Maintenant</div></div>
                <div class="thumb" id="thS"></div><div class="thumb" id="thE"></div>
            </div>
        </div>
        <div class="legend-btn-wrap">
            <button class="legend-btn" id="btnOpenLegend">
                <svg style="width:16px;height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                Légende interactive
            </button>
        </div>
    </div>

    <div class="viewport" id="viewport">
        <canvas id="mapCanvas"></canvas>
        <div id="canvasTooltip"></div>
    </div>

    <div class="footer-bar">
        <a href="https://www.buymeacoffee.com/hdbdt" target="_blank" class="footer-link footer-link-left bmc-footer-link" title="Aider à financer le développement">
            Me soutenir
            <svg style="width: 14px; height: 14px; margin-left: 6px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>
        </a>
        <span class="footer-separator">|</span>
        <a href="https://tally.so/r/vGAPO8" target="_blank" class="footer-link footer-link-right">Une erreur/suggestion ?</a>
    </div>

    <div id="actionBar" class="action-bar">
        <div class="action-header">
            <h3 class="action-title" id="barTitle">Place --</h3>
            <button class="action-close" id="btnCloseAction">
                <svg style="width:16px;height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <div class="action-details">
            <div class="action-availability" id="barAvailability">Sélectionnez une place</div>
            <div class="action-amenities" id="barAmenities"></div>
        </div>
        <button class="action-btn" id="btnBook">Réserver</button>
    </div>
    
    <div id="toast" class="toast">⚠️ Données indisponibles</div>

    <div id="legendModal" class="modal-overlay">
        <div class="modal-content" id="legendModalContent">
            <div class="modal-header">
                <h3>Comprendre le plan</h3>
                <button class="modal-close" id="btnCloseLegend">
                    <svg style="width:18px;height:18px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="legend-list">
                    <div class="leg-interactive" data-type="unknown"><div class="swatch sw-unknown"></div> Données inconnues</div>
                    <div class="leg-interactive" data-type="busy"><div class="swatch sw-busy"></div> Place occupée</div>
                    <div class="leg-interactive" data-type="free"><div class="swatch sw-free"></div> Place libre</div>
                    <div class="leg-interactive" data-type="plug"><div class="swatch sw-plug"></div> Prises individuelles</div>
                    <div class="leg-interactive" data-type="light"><div class="swatch sw-light"></div> Lampe de bureau</div>
                </div>
                <div class="legend-showcase">
                    <canvas id="demoCanvas" width="160" height="160"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
