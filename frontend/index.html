<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="https://i.goopics.net/mghcvl.png">
    <title>Plan BU Saint-Serge</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --seat-unknown: #cbd5e1;
            --seat-busy: #64748b;
            --seat-free: rgba(16, 185, 129, 0.8);
            --seat-border: rgba(255, 255, 255, 0.4);
            --plug-color: #3b82f6;
            --light-glow: rgba(253, 224, 71, 0.4);
            --tooltip-bg: rgba(15, 23, 42, 0.9);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 0;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            overscroll-behavior: none;
        }

        /* Header & Controls */
        .header {
            flex-shrink: 0;
            z-index: 50;
            background: #fff;
            padding: 12px 30px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 3px rgba(0,0,0,.05);
            padding-top: max(12px, env(safe-area-inset-top));
        }

        .title { font-weight: 700; color: #1e293b; font-size: 20px; letter-spacing: -.5px; }

        .reload-btn {
            background: #fff;
            border: 1px solid #cbd5e1;
            padding: 6px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #475569;
            transition: all .2s;
        }

        .reload-btn:hover { background: #f1f5f9; border-color: #94a3b8; }

        .controls {
            flex-shrink: 0;
            background: #fff;
            padding: 15px 30px;
            border-bottom: 1px solid #e2e8f0;
            display: grid;
            grid-template-columns: 200px 1fr 200px;
            gap: 30px;
            align-items: center;
            z-index: 40;
            user-select: none;
        }

        .date-sel { padding: 6px 10px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 14px; width: 100%; outline: 0; cursor: pointer; }

        /* Slider */
        .slider-container { display: flex; flex-direction: column; gap: 5px; }
        .time-label { text-align: center; font-weight: 600; color: var(--primary); font-size: 14px; margin-bottom: 5px; }
        .slider-wrap { position: relative; height: 30px; cursor: pointer; touch-action: none; }
        .track { position: absolute; top: 50%; width: 100%; height: 6px; background: #e2e8f0; border-radius: 3px; transform: translateY(-50%); }
        .fill { position: absolute; top: 50%; height: 6px; background: var(--primary); transform: translateY(-50%); border-radius: 3px; }
        .thumb { position: absolute; top: 50%; width: 20px; height: 20px; background: #fff; border: 2px solid var(--primary); border-radius: 50%; transform: translate(-50%,-50%); box-shadow: 0 1px 3px rgba(0,0,0,.2); transition: transform .1s; z-index: 10; }
        .now-marker { position: absolute; top: -5px; bottom: -5px; width: 2px; background: red; z-index: 5; pointer-events: none; display: none; }
        .now-label { position: absolute; top: -12px; left: -50%; transform: translateX(-25%); font-size: 10px; color: red; font-weight: 700; }

        /* Map & Viewport */
        .viewport { flex: 1; position: relative; background: #e2e8f0; overflow: auto; padding: 40px; }
        .map-container { position: relative; width: 1600px; margin: 0 auto; background: #fff; box-shadow: 0 4px 6px -1px rgba(0,0,0,.1); transform-origin: 0 0; }
        .map-img { width: 100%; display: block; pointer-events: none; user-select: none; }
        .map-box { position: absolute; display: grid; gap: 2px; pointer-events: none; border-radius: 3px; }
        .map-box.has-plug::after { content: ""; position: absolute; inset: -3px; border: 3px solid var(--plug-color); border-radius: 5px; pointer-events: none; z-index: 10; }
        .map-box.has-light { background: var(--light-glow); box-shadow: 0 0 20px var(--light-glow); }

        /* Seats & Optimized Animation */
        .seat {
            background: var(--seat-unknown);
            border: 1px solid var(--seat-border);
            border-radius: 2px;
            pointer-events: auto;
            transition: transform .2s ease, background .2s ease;
            position: relative;
            cursor: pointer;
        }

        @keyframes sharp-wave-opacity {
            0%, 20%, 100% { opacity: 0; }
            10% { opacity: 1; }
        }

        .seat.skeleton::before {
            content: "";
            position: absolute;
            inset: 0;
            background-color: #fff;
            border-radius: inherit;
            pointer-events: none;
            will-change: opacity;
            animation: sharp-wave-opacity 1.5s infinite linear;
            animation-delay: calc(((100 - var(--x-pos)) + (100 - var(--y-pos))) * .008s);
        }

        .seat.is-busy { background: var(--seat-busy); }
        .seat.is-free { background: var(--seat-free); box-shadow: inset 0 0 4px rgba(255,255,255,.4); z-index: 2; }
        .seat.is-selected { transform: scale(1.2); z-index: 100; border-color: #fff; box-shadow: 0 4px 6px rgba(0,0,0,.1); }

        /* Tooltip */
        @media (hover: hover) {
            .seat:hover { transform: scale(1.2); z-index: 100; border-color: #fff; box-shadow: 0 4px 6px rgba(0,0,0,.1); }
            .seat:hover::after {
                content: attr(data-label);
                position: absolute;
                bottom: 130%;
                left: 50%;
                transform: translateX(-50%);
                background: var(--tooltip-bg);
                color: #fff;
                padding: 6px 10px;
                border-radius: 4px;
                font-size: 14px;
                font-weight: 600;
                white-space: nowrap;
                z-index: 200;
            }
        }

        /* Legend Modal */
        .legend-btn { background: #f8fafc; border: 1px solid #e2e8f0; padding: 8px 16px; border-radius: 8px; font-weight: 600; color: #475569; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s; font-size: 14px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 10000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; padding: 20px; }
        .modal-overlay.visible { opacity: 1; pointer-events: auto; }
        .modal-content { background: #fff; border-radius: 16px; width: 100%; max-width: 500px; transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); overflow: hidden; }
        .modal-overlay.visible .modal-content { transform: scale(1); }
        .modal-header { padding: 20px 24px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { display: flex; padding: 24px; gap: 30px; }
        .legend-list { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .leg-interactive { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; cursor: pointer; color: #475569; font-weight: 500; font-size: 14px; }
        .swatch { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; }
        .sw-plug { border: 2px solid var(--plug-color); }
        .sw-light { background: #fef08a; border: 1px solid #eab308; }
        .sw-unknown { background: var(--seat-unknown); }
        .sw-busy { background: var(--seat-busy); }
        .sw-free { background: var(--seat-free); }
        .legend-showcase { width: 140px; background: #e2e8f0; border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .demo-box { position: relative !important; width: 80px !important; height: 80px !important; grid-template-columns: 1fr 1fr !important; grid-template-rows: 1fr 1fr !important; gap: 4px !important; }

        /* Action Bar & Toasts */
        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 20px 24px; box-shadow: 0 -4px 20px rgba(0,0,0,0.15); transform: translateY(110%); transition: transform .3s cubic-bezier(.16,1,.3,1); z-index: 9999; display: flex; justify-content: space-between; align-items: center; border-top-left-radius: 16px; border-top-right-radius: 16px; padding-bottom: max(20px, env(safe-area-inset-bottom)); }
        .action-bar.visible { transform: translateY(0); }
        .action-btn { background: var(--primary); color: #fff; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px); color: #fff; padding: 10px 20px; border-radius: 20px; font-weight: 600; opacity: 0; transition: all .3s ease; z-index: 2000; }
        .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Footer */
        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); border-top: 1px solid #e2e8f0; display: flex; align-items: stretch; z-index: 500; backdrop-filter: blur(4px); font-size: 13px; }
        .footer-link { flex: 1; display: flex; align-items: center; padding: 10px 0; padding-bottom: max(10px, env(safe-area-inset-bottom)); color: #64748b; text-decoration: none; font-weight: 500; }
        .footer-separator { display: flex; align-items: center; color: #cbd5e1; padding: 10px 0; padding-bottom: max(10px, env(safe-area-inset-bottom)); }

        @media (max-width:768px) {
            .controls { grid-template-columns: 1fr auto; grid-template-areas: "date legend" "slider slider"; gap: 12px; padding: 15px; }
            .date-sel, .legend-btn { height: 36px; }
            .slider-container { grid-area: slider; flex-direction: row; align-items: center; }
            .modal-body { flex-direction: column-reverse; align-items: center; }
            .legend-showcase { width: 100%; height: 120px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="title">📚 Plan BU Saint-Serge</div>
            <a href="https://github.com/Seuguhfr/plan-bu" target="_blank" style="color:#1e293b;"><svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg></a>
        </div>
        <button class="reload-btn" id="btnReload"><span id="lastUpdate">--:--</span> <span>↻ Actualiser</span></button>
    </div>

    <div class="controls">
        <div><select id="datePicker" class="date-sel"></select></div>
        <div class="slider-container">
            <div class="time-label"><span id="lblStart">--</span> - <span id="lblEnd">--</span></div>
            <div class="slider-wrap" id="slider">
                <div class="track"></div><div class="fill" id="fill"></div>
                <div id="nowMarker" class="now-marker"><div class="now-label">Maintenant</div></div>
                <div class="thumb" id="thS"></div><div class="thumb" id="thE"></div>
            </div>
        </div>
        <div style="display:flex; justify-content: flex-end;">
            <button class="legend-btn" id="btnOpenLegend">ℹ️ Légende interactive</button>
        </div>
    </div>

    <div class="viewport" id="viewport">
        <div class="map-container" id="mapContainer">
            <img id="mapImageElement" class="map-img" alt="Map"><div id="overlay"></div>
        </div>
        <button id="btnReset" style="display:none; position:absolute; bottom:60px; right:20px; background:#fff; border:1px solid #cbd5e1; padding:10px; border-radius:50%; width:44px; height:44px; z-index:100; cursor:pointer;">⛶</button>
    </div>

    <div class="footer-bar">
        <a href="https://www.buymeacoffee.com/hdbdt" target="_blank" class="footer-link" style="justify-content: flex-end; padding-right:8px; color:#d97706;">Me soutenir ☕</a>
        <span class="footer-separator">|</span>
        <a href="https://tally.so/r/vGAPO8" target="_blank" class="footer-link" style="justify-content: flex-start; padding-left:8px;">Une erreur/suggestion ?</a>
    </div>

    <div id="actionBar" class="action-bar">
        <div style="display:flex; flex-direction:column;">
            <div id="barTitle" style="font-size:18px; font-weight:700; color:#1e293b;">Place --</div>
            <div id="barStatus" style="font-size:13px; color:#64748b;">Sélectionnez une place</div>
        </div>
        <button class="action-btn" id="btnBook">Réserver</button>
    </div>

    <div id="toast" class="toast">⚠️ Données indisponibles</div>

    <div id="legendModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin:0;">Comprendre le plan</h3>
                <button id="btnCloseLegend" style="background:none; border:none; font-size:24px; cursor:pointer;">×</button>
            </div>
            <div class="modal-body">
                <div class="legend-list">
                    <div class="leg-interactive" data-type="unknown"><div class="swatch sw-unknown"></div> Données inconnues</div>
                    <div class="leg-interactive" data-type="busy"><div class="swatch sw-busy"></div> Place occupée</div>
                    <div class="leg-interactive" data-type="free"><div class="swatch sw-free"></div> Place libre</div>
                    <div class="leg-interactive" data-type="plug"><div class="swatch sw-plug"></div> Prises dispo.</div>
                    <div class="leg-interactive" data-type="light"><div class="swatch sw-light"></div> Lampe dispo.</div>
                </div>
                <div class="legend-showcase">
                    <div id="demoBox" class="map-box demo-box">
                        <div class="seat demo-seat"></div><div class="seat demo-seat"></div>
                        <div class="seat demo-seat"></div><div class="seat demo-seat"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://plan-bu-backend.hdbdt1597-cloudflare.workers.dev";
        const SITE_SLUG = "bua-st-serge";
        let LOCATIONS = {}, AVAILABILITY = {}, selectedSeatId = null;
        const MIN_HOUR = 8, MAX_HOUR = 22;
        const nowH = new Date().getHours();
        let startHour = Math.max(MIN_HOUR, Math.min(MAX_HOUR, nowH));
        let endHour = Math.max(MIN_HOUR, Math.min(MAX_HOUR, nowH + 2));
        const SEAT_CACHE = {}, MAP_BOX_CACHE = [];

        const els = {
            dp: document.getElementById('datePicker'),
            overlay: document.getElementById('overlay'),
            toast: document.getElementById('toast'),
            slider: document.getElementById('slider'),
            btnReload: document.getElementById('btnReload'),
            lastUpdate: document.getElementById('lastUpdate'),
            fill: document.getElementById('fill'),
            thS: document.getElementById('thS'),
            thE: document.getElementById('thE'),
            lblStart: document.getElementById('lblStart'),
            lblEnd: document.getElementById('lblEnd'),
            mapContainer: document.getElementById('mapContainer'),
            mapImageElement: document.getElementById('mapImageElement'),
            viewport: document.getElementById('viewport'),
            btnReset: document.getElementById('btnReset'),
            actionBar: document.getElementById('actionBar'),
            barTitle: document.getElementById('barTitle'),
            barStatus: document.getElementById('barStatus'),
            btnBook: document.getElementById('btnBook'),
            nowMarker: document.getElementById('nowMarker'),
            legendModal: document.getElementById('legendModal')
        };

        async function init() {
            els.mapImageElement.onload = resetMap;
            els.mapImageElement.src = `${API_BASE_URL}/assets/map.webp`;

            const today = new Date();
            for(let i=0; i<4; i++){
                let d = new Date(today); d.setDate(today.getDate()+i);
                let t = d.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
                els.dp.add(new Option(t.charAt(0).toUpperCase() + t.slice(1), d.toISOString().split('T')[0]));
            }

            try {
                const configRes = await fetch(`${API_BASE_URL}/api/config`);
                LOCATIONS = await configRes.json();
                buildMap();
                setupMobileMap();
                setupLegendModal();
                loadData();
            } catch(e) { showToast("Erreur critique", true); }

            els.btnReload.addEventListener('click', () => loadData(true));
            els.dp.addEventListener('change', () => { updateUI(); loadData(); updateTimeMarker(); });
            els.btnReset.addEventListener('click', resetMap);
            els.btnBook.addEventListener('click', () => selectedSeatId && openBooking(selectedSeatId));
            els.viewport.addEventListener('click', (e) => !wasDragging && deselect());
            
            updateUI();
            updateTimeMarker();
            setInterval(updateTimeMarker, 60000);
        }

        function setupLegendModal() {
            document.getElementById('btnOpenLegend').onclick = () => els.legendModal.classList.add('visible');
            document.getElementById('btnCloseLegend').onclick = () => els.legendModal.classList.remove('visible');
            els.legendModal.onclick = (e) => e.target === els.legendModal && els.legendModal.classList.remove('visible');

            const demoBox = document.getElementById('demoBox');
            const demoSeats = demoBox.querySelectorAll('.demo-seat');
            const resetDemo = () => {
                demoBox.className = 'map-box demo-box';
                demoSeats.forEach((s, i) => s.className = 'seat demo-seat ' + (i % 2 === 0 ? 'is-free' : 'is-busy'));
            };

            document.querySelectorAll('.leg-interactive').forEach(item => {
                item.onpointerenter = () => {
                    const type = item.dataset.type;
                    demoBox.className = 'map-box demo-box';
                    if(type === 'unknown') demoSeats.forEach(s => s.className = 'seat demo-seat');
                    else if(type === 'busy') demoSeats.forEach(s => s.className = 'seat demo-seat is-busy');
                    else if(type === 'free') demoSeats.forEach(s => s.className = 'seat demo-seat is-free');
                    else if(type === 'plug') demoBox.classList.add('has-plug');
                    else if(type === 'light') demoBox.classList.add('has-light');
                };
                item.onpointerleave = resetDemo;
            });
            resetDemo();
        }

        async function loadData(force = false) {
            els.btnReload.style.opacity = '0.5';
            Object.values(SEAT_CACHE).forEach(el => { el.classList.remove('is-free', 'is-busy', 'is-selected'); el.classList.add('skeleton'); });
            try {
                const res = await fetch(`${API_BASE_URL}/api/load_day?date=${els.dp.value}&force=${force}&t=${Date.now()}`);
                if (res.status === 503) return setTimeout(() => loadData(force), 2000);
                const data = await res.json();
                AVAILABILITY = data;
                const now = new Date();
                els.lastUpdate.innerText = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
                showToast(Object.keys(data).length ? "À jour" : "Fermé", !Object.keys(data).length);
                updateMap();
            } catch(e) { showToast("Erreur connexion", true); }
            els.btnReload.style.opacity = '1';
        }

        function buildMap() {
            Object.values(LOCATIONS).forEach(g => {
                const box = document.createElement('div');
                let ids = [];
                if (g.id) ids = [g.id.toString()];
                else if (g.start !== undefined) for(let i=0; i<=(g.end-g.start); i++) ids.push((parseInt(g.start)+i).toString());
                
                box.className = `map-box ${g.direction || 'horizontal'}`;
                box.style.setProperty('--x-pos', g.x); box.style.setProperty('--y-pos', g.y);
                Object.assign(box.style, { left: g.x+'%', top: g.y+'%', width: g.w+'%', height: g.h+'%' });
                MAP_BOX_CACHE.push({ el: box, startId: ids[0] });

                const isDouble = g.layout === 'double';
                let cols = g.direction === 'horizontal' ? (isDouble ? Math.ceil(ids.length/2) : ids.length) : (isDouble ? 2 : 1);
                let rows = g.direction === 'horizontal' ? (isDouble ? 2 : 1) : (isDouble ? Math.ceil(ids.length/2) : ids.length);
                box.style.gridTemplateColumns = `repeat(${cols}, 1fr)`; box.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
                if (isDouble && g.direction !== 'horizontal') box.style.gridAutoFlow = 'column';

                ids.forEach(id => {
                    const el = document.createElement('div');
                    el.className = 'seat skeleton'; el.id = 'seat-' + id; el.dataset.label = g.label || id;
                    el.onclick = (e) => { e.stopPropagation(); !wasDragging && selectSeat(id, el); };
                    SEAT_CACHE[id] = el; box.appendChild(el);
                });
                els.overlay.appendChild(box);
            });
        }

        function updateMap() {
            const isSun = new Date(els.dp.value).getDay() === 0;
            const s = Math.min(startHour, endHour), e = Math.max(startHour, endHour);
            const req = []; for (let h=s; h<(s===e?s+1:e); h++) req.push((h<10?'0'+h:h)+(isSun?':00':':30'));

            MAP_BOX_CACHE.forEach(b => {
                b.el.classList.remove('has-plug', 'has-light');
                const d = AVAILABILITY[b.startId];
                if (d) { if(d.hasPlug) b.el.classList.add('has-plug'); if(d.hasLight) b.el.classList.add('has-light'); }
            });

            Object.entries(SEAT_CACHE).forEach(([id, el]) => {
                const d = AVAILABILITY[id]; el.classList.remove('skeleton', 'is-free', 'is-busy');
                if (d) el.classList.add(req.every(r => d.slots.includes(r)) ? 'is-free' : 'is-busy');
            });
        }

        function selectSeat(id, el) {
            if (selectedSeatId) SEAT_CACHE[selectedSeatId]?.classList.remove('is-selected');
            selectedSeatId = id; el.classList.add('is-selected');
            els.barTitle.innerText = isNaN(id) ? id : "Place " + id;
            const d = AVAILABILITY[id], dets = []; if(d) { if(d.hasPlug) dets.push("Prise"); if(d.hasLight) dets.push("Lampe"); }
            els.barStatus.innerText = dets.length ? dets.join(' • ') : "Standard";
            els.actionBar.classList.add('visible');
        }

        function deselect() { if(selectedSeatId) SEAT_CACHE[selectedSeatId]?.classList.remove('is-selected'); selectedSeatId=null; els.actionBar.classList.remove('visible'); }

        function openBooking(num) {
            const d = AVAILABILITY[num]; if (!d) return;
            window.open(`https://affluences.com/fr/sites/${SITE_SLUG}/reservation?type=${d.typeId||"245"}&date=${els.dp.value}&resource=${d.resourceId||num}`, '_blank');
        }

        function updateTimeMarker() {
            const now = new Date();
            if (els.dp.value === now.toISOString().split('T')[0]) {
                const dec = now.getHours() + (now.getMinutes() / 60);
                if (dec >= MIN_HOUR+0.5 && dec <= MAX_HOUR+0.5) {
                    els.nowMarker.style.left = (((dec - (MIN_HOUR+0.5)) / (MAX_HOUR - MIN_HOUR)) * 100) + '%';
                    els.nowMarker.style.display = 'block'; return;
                }
            } els.nowMarker.style.display = 'none';
        }

        function updateUI() {
            const isSun = new Date(els.dp.value).getDay() === 0;
            const pS = ((startHour-MIN_HOUR)/(MAX_HOUR-MIN_HOUR))*100, pE = ((endHour-MIN_HOUR)/(MAX_HOUR-MIN_HOUR))*100;
            els.thS.style.left = pS+'%'; els.thE.style.left = pE+'%'; els.fill.style.left = Math.min(pS, pE)+'%'; els.fill.style.width = Math.abs(pE-pS)+'%';
            els.lblStart.innerText = (Math.min(startHour, endHour)<10?'0':'')+Math.min(startHour, endHour)+(isSun?':00':':30');
            els.lblEnd.innerText = (Math.max(startHour, endHour)<10?'0':'')+Math.max(startHour, endHour)+(isSun?':00':':30');
            updateMap();
        }

        let activeThumb = null;
        const getH = (x) => { const r = els.slider.getBoundingClientRect(); return Math.round(MIN_HOUR + Math.max(0, Math.min(1, (x - r.left) / r.width)) * (MAX_HOUR - MIN_HOUR)); };
        els.slider.onmousedown = e => { const h=getH(e.clientX); if(Math.abs(h-startHour)<Math.abs(h-endHour)) {activeThumb='S';startHour=h;} else {activeThumb='E';endHour=h;} updateUI(); };
        window.onmousemove = e => { if(activeThumb) { if(activeThumb==='S') startHour=getH(e.clientX); else endHour=getH(e.clientX); updateUI(); }};
        window.onmouseup = () => activeThumb = null;
        els.slider.ontouchstart = e => { e.preventDefault(); const h=getH(e.touches[0].clientX); if(Math.abs(h-startHour)<Math.abs(h-endHour)) {activeThumb='S';startHour=h;} else {activeThumb='E';endHour=h;} updateUI(); };
        window.ontouchmove = e => { if(activeThumb) { if(activeThumb==='S') startHour=getH(e.touches[0].clientX); else endHour=getH(e.touches[0].clientX); updateUI(); }};
        window.ontouchend = () => activeThumb = null;

        let state = { x: 0, y: 0, scale: 1 }, wasDragging = false;
        function resetMap() { state = { x: 0, y: 0, scale: els.viewport.clientWidth / 1600 }; applyT(); }
        function applyT() {
            const vW = els.viewport.clientWidth, vH = els.viewport.clientHeight;
            const mW = 1600 * state.scale, mH = els.mapContainer.offsetHeight * state.scale;
            state.x = Math.max((vW/2)-mW, Math.min(vW/2, state.x)); state.y = Math.max((vH/2)-mH, Math.min(vH/2, state.y));
            els.mapContainer.style.transform = `translate3d(${state.x}px, ${state.y}px, 0) scale(${state.scale})`;
        }

        function setupMobileMap() {
            let isDown = false, sX, sY;
            els.mapContainer.onmousedown = e => { isDown=true; sX=e.clientX - state.x; sY=e.clientY - state.y; wasDragging=false; };
            window.onmouseup = () => isDown = false;
            window.onmousemove = e => { if(isDown) { wasDragging=true; state.x=e.clientX-sX; state.y=e.clientY-sY; applyT(); }};

            let sD = 0, sS = 1, sVX = 0, sVY = 0;
            const getD = t => Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
            els.mapContainer.ontouchstart = e => {
                wasDragging = false; const r = els.viewport.getBoundingClientRect();
                if(e.touches.length === 1) { sVX = (e.touches[0].clientX - r.left) - state.x; sVY = (e.touches[0].clientY - r.top) - state.y; }
                else if(e.touches.length === 2) { sD = getD(e.touches); sS = state.scale; const mX = (e.touches[0].clientX + e.touches[1].clientX)/2, mY = (e.touches[0].clientY + e.touches[1].clientY)/2; sVX = (mX - r.left) - state.x; sVY = (mY - r.top) - state.y; }
            };
            els.mapContainer.ontouchmove = e => {
                e.preventDefault(); wasDragging = true; const r = els.viewport.getBoundingClientRect();
                if (e.touches.length === 2) {
                    const cD = getD(e.touches); if (cD === 0) return;
                    const rS = cD / sD; state.scale = Math.max(0.1, Math.min(sS * rS, 4));
                    const mX = (e.touches[0].clientX + e.touches[1].clientX)/2, mY = (e.touches[0].clientY + e.touches[1].clientY)/2;
                    state.x = (mX - r.left) - (sVX * rS); state.y = (mY - r.top) - (sVY * rS);
                } else if (e.touches.length === 1) { state.x = (e.touches[0].clientX - r.left) - sVX; state.y = (e.touches[0].clientY - r.top) - sVY; }
                applyT();
            };
        }

        function showToast(m, e) { els.toast.innerText = m; els.toast.style.background = e ? '#ef4444' : '#22c55e'; els.toast.classList.add('visible'); setTimeout(() => els.toast.classList.remove('visible'), 4000); }
        init();
    </script>
</body>
</html>
